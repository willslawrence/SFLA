<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>SFLA Tracker</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800&family=JetBrains+Mono:wght@400;500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #ff4100;
      --primary-dark: #ff6a00;
      --suitable: #22c55e;
      --suitable-stale: #eab308;
      --suitable-old: #f97316;
      --unsuitable: #6b7280;
      --pending: #ef4444;
      --route: #e879f9;
      --bg-dark: #05053f;
      --bg-card: rgba(5,5,63,0.85);
      --text: #f0f0f0;
      --text-muted: rgba(255,255,255,0.45);
    }
    
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { 
      font-family: 'Barlow Condensed', 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-dark);
      color: var(--text);
    }
    #map { height: calc(100vh - 52px); width: 100%; margin-top: 52px; }
    .appbar{position:fixed;top:0;left:0;right:0;height:52px;background:#0f2742;color:#fff;display:flex;align-items:center;gap:10px;padding:0 14px;z-index:1100;box-shadow:0 2px 8px rgba(0,0,0,.25);box-sizing:border-box;}
    .appbar img{height:28px}
    .appbar .t{font:600 15px -apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;letter-spacing:.02em}
    .appbar .sp{flex:1}
    .appbar a.bk{color:#cdd7e3;text-decoration:none;font:600 13px -apple-system,'Segoe UI',Roboto,sans-serif}
    .route-pill{display:inline-block;transform:translate(-50%,-50%);background:#0f2742;color:#fff;padding:3px 10px;border-radius:999px;font:600 11px -apple-system,'Segoe UI',Roboto,sans-serif;white-space:nowrap;box-shadow:0 1px 4px rgba(0,0,0,.35);letter-spacing:.02em;}
    
    /* Dark leaflet popup - HIDDEN (using custom info panel) */
    .leaflet-popup { display: none !important; }
    
    /* Top info panel */
    #info-panel {
      position: fixed;
      top: 16px;
      left: 16px;
      background: var(--bg-card);
      border-radius: 28px;
      padding: 16px 18px 20px;
      max-width: 210px;
      z-index: 1001;
      box-shadow: 0 4px 24px rgba(0,0,0,0.5);
      border: 1.5px solid rgba(255,255,255,0.06);
      -webkit-backdrop-filter: blur(16px);
      backdrop-filter: blur(16px);
      display: none;
      overflow: hidden;
    }
    #info-panel::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 10%;
      width: 80%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,65,0,0.25), transparent);
    }
    #info-panel.active { display: block; }
    #info-panel .panel-name {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 15px;
      font-weight: 800;
      color: var(--primary);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    #info-panel .panel-status {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      margin-bottom: 4px;
    }
    #info-panel .panel-date {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--text-muted);
    }
    #info-panel .panel-area {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--text);
      margin-top: 4px;
      font-weight: 500;
    }
    #info-panel .panel-close {
      position: absolute;
      top: 10px;
      right: 12px;
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 14px;
      cursor: pointer;
    }
    #info-panel textarea {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1.5px solid rgba(255,255,255,0.08);
      border-radius: 18px;
      padding: 10px 12px;
      color: var(--text);
      font-size: 12px;
      font-family: 'JetBrains Mono', monospace;
      resize: none;
      height: 40px;
      margin-top: 8px;
    }
    #info-panel textarea:focus {
      outline: none;
      border-color: var(--primary);
    }
    #info-panel textarea::placeholder { color: var(--text-muted); }
    
    /* Radial action buttons */
    #radial-menu {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1000;
      display: none;
    }
    #radial-menu.active { display: block; }
    
    .radial-btn {
      position: absolute;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: none;
      font-size: 20px;
      cursor: pointer;
      pointer-events: auto;
      box-shadow: 0 4px 15px rgba(0,0,0,0.4), 0 0 20px rgba(255,65,0,0.1);
      transition: transform 0.15s, box-shadow 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .radial-btn:active { transform: scale(0.9); }
    .radial-btn.btn-suitable { background: var(--suitable); color: white; }
    .radial-btn.btn-unsuitable { background: var(--unsuitable); color: white; }
    .radial-btn.btn-close { 
      background: rgba(255,255,255,0.9); 
      color: #333; 
      width: 36px; 
      height: 36px; 
      font-size: 16px; 
    }
    
    .radial-line {
      position: absolute;
      background: rgba(255,255,255,0.4);
      height: 2px;
      transform-origin: left center;
      pointer-events: none;
    }
    
    /* Popup styling */
    .popup-name { 
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 22px; 
      font-weight: 800; 
      margin-bottom: 12px;
      color: var(--primary);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .popup-info { 
      display: flex; 
      justify-content: space-between; 
      margin-bottom: 8px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      color: var(--text-muted);
    }
    .popup-info span:last-child { color: var(--text); font-weight: 500; }
    
    .popup-status {
      display: inline-block;
      padding: 4px 14px;
      border-radius: 18px;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .status-suitable { background: var(--suitable); color: white; }
    .status-suitable-stale { background: var(--suitable-stale); color: white; }
    .status-suitable-old { background: var(--suitable-old); color: white; }
    .status-unsuitable { background: var(--unsuitable); color: white; }
    .status-pending { background: var(--pending); color: white; }
    
    .popup-notes {
      margin: 14px 0;
    }
    .popup-notes textarea {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1.5px solid rgba(255,255,255,0.08);
      border-radius: 18px;
      padding: 12px;
      color: var(--text);
      font-size: 14px;
      font-family: 'JetBrains Mono', monospace;
      resize: none;
      min-height: 60px;
    }
    .popup-notes textarea:focus {
      outline: none;
      border-color: var(--primary);
    }
    .popup-notes textarea::placeholder { color: var(--text-muted); }
    
    .popup-buttons {
      display: flex;
      gap: 12px;
      margin-top: 16px;
    }
    .popup-btn {
      flex: 1;
      padding: 14px 10px;
      border: none;
      border-radius: 18px;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 15px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: transform 0.1s, opacity 0.2s;
    }
    .popup-btn:active { transform: scale(0.97); }
    .popup-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .btn-suitable { background: var(--suitable); color: white; }
    .btn-unsuitable { background: var(--unsuitable); color: white; }
    
    /* Controls */
    .controls {
      position: absolute;
      top: 64px;
      right: 16px;
      z-index: 1000;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .control-btn {
      width: 44px;
      height: 44px;
      background: var(--bg-card);
      border: 1.5px solid rgba(255,255,255,0.06);
      border-radius: 18px;
      color: var(--text);
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 20px;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
      -webkit-backdrop-filter: blur(12px);
      backdrop-filter: blur(12px);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: box-shadow 0.15s, background 0.15s;
    }
    .control-btn:hover { 
      background: rgba(255,65,0,0.15);
      box-shadow: 0 4px 15px rgba(0,0,0,0.3), 0 0 16px rgba(255,65,0,0.2);
    }
    .control-btn.active { 
      background: linear-gradient(135deg, #ff4100, #ff6a00);
    }
    
    /* Legend - HIDDEN */
    .legend { display: none; }
    .map-legend {
      position: absolute;
      bottom: 30px;
      left: 10px;
      z-index: 1000;
      background: rgba(5,5,63,0.75);
      border: 1.5px solid rgba(255,255,255,0.06);
      border-radius: 18px;
      padding: 8px 12px;
      font-size: 9px;
      color: rgba(200,200,200,0.8);
      -webkit-backdrop-filter: blur(12px);
      backdrop-filter: blur(12px);
    }
    .map-legend h4 {
      margin: 0 0 4px;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: rgba(255,255,255,0.8);
    }
    .map-legend .legend-row {
      display: flex;
      align-items: center;
      gap: 5px;
      margin: 2px 0;
    }
    .map-legend .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      display: inline-block;
    }
    
    /* Shape labels */
    .shape-label {
      background: transparent;
      border: none;
      color: white;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      text-shadow: 0 1px 3px rgba(0,0,0,0.8), 0 0 2px rgba(0,0,0,0.9);
      white-space: nowrap;
    }
    
    /* Location dot */
    .my-location {
      width: 16px;
      height: 16px;
      background: #3b82f6;
      border: 3px solid white;
      border-radius: 50%;
      box-shadow: 0 0 10px rgba(59,130,246,0.5);
    }
    .my-location.following {
      animation: pulse-loc 1.5s ease-in-out infinite;
    }
    @keyframes pulse-loc {
      0%, 100% { box-shadow: 0 0 10px rgba(59,130,246,0.5); }
      50% { box-shadow: 0 0 20px rgba(59,130,246,0.8), 0 0 40px rgba(59,130,246,0.3); }
    }
    
    /* Location accuracy circle */
    .accuracy-circle {
      background: rgba(59,130,246,0.1);
      border: 1px solid rgba(59,130,246,0.3);
      border-radius: 50%;
    }
    
    /* Hide default leaflet controls */
    .leaflet-control-zoom { display: none; }
    .gps-label {
      background: rgba(0,0,0,0.7) !important;
      border: 1px solid #00ffff !important;
      color: #00ffff !important;
      font-size: 11px !important;
      font-weight: bold !important;
      padding: 2px 6px !important;
      border-radius: 3px !important;
    }
  </style>
</head>
<body>
  <div id="map"></div>
  <div class="map-legend">
    <h4>SFLA Status</h4>
    <div class="legend-row"><span class="dot" style="background:#4caf50"></span> Current</div>
    <div class="legend-row"><span class="dot" style="background:#ffeb3b"></span> Review</div>
    <div class="legend-row"><span class="dot" style="background:#ff9800"></span> Review Overdue</div>
    <div class="legend-row"><span class="dot" style="background:#f44336"></span> New SFLA</div>
  </div>
  
  <div class="controls">
    <button class="control-btn" id="btnLocation" title="My Location">📍</button>
    <button class="control-btn" id="btnSatellite" title="Satellite View">🛰️</button>
    <button class="control-btn" id="btnZoomIn" title="Zoom In">+</button>
    <button class="control-btn" id="btnZoomOut" title="Zoom Out">−</button>
  </div>
  
  <!-- Top info panel -->
  <div id="info-panel">
    <button class="panel-close" onclick="closePanel()">✕</button>
    <div class="panel-name" id="panelName"></div>
    <div class="panel-status" id="panelStatus"></div>
    <div class="panel-area" id="panelArea"></div>
    <div class="panel-date" id="panelDate"></div>
    <textarea id="panelNotes" placeholder="Notes..."></textarea>
  </div>

  <!-- Radial action buttons -->
  <div id="radial-menu">
    <div class="radial-line" id="lineSuitable"></div>
    <div class="radial-line" id="lineUnsuitable"></div>
    <button class="radial-btn btn-suitable" id="radialSuitable">✓</button>
    <button class="radial-btn btn-unsuitable" id="radialUnsuitable">✗</button>
    <button class="radial-btn btn-close" id="radialClose">✕</button>
  </div>
  
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="shapes.js"></script>
  <script>
    // Config
    const AIRTABLE_BASE = 'appBJW3FvPw5c659F';
    const AIRTABLE_TABLE = 'SFLA Sites v2';
    // No Airtable token in the browser. Reads = baked data.geojson; writes = PIN-gated Cloudflare Worker.
    const WORKER_URL = 'https://sfla-write.thehelicopter.workers.dev';
    function getPin(){ let p=localStorage.getItem('sflaPin'); if(!p){ p=prompt('Enter THC SFLA update PIN:'); if(p) localStorage.setItem('sflaPin',p);} return p; }
    const AREA_TAGS = {uam:'UAM', malham:'Malham', 'city-tour':'City Tour', najd:'NAJD'};
    const AREA_TAG = AREA_TAGS[new URLSearchParams(location.search).get('area')] || null;
    const AREA_LABEL = AREA_TAG || 'All Areas';
    const VIS_SHAPES_FN = () => AREA_TAG ? SHAPES.filter(s => (s.areas||[]).includes(AREA_TAG)) : SHAPES;
    document.addEventListener('DOMContentLoaded', () => {
      document.title = 'SFLA — ' + AREA_LABEL;
      const bar = document.createElement('div'); bar.className = 'appbar';
      bar.innerHTML = '<img src="thc_logo.png" alt="THC"><span class="t">SFLA — ' + AREA_LABEL + '</span><span class="sp"></span><a class="bk" href="index.html">‹ All areas</a>';
      document.body.appendChild(bar);
      try { if (typeof map !== 'undefined' && map) setTimeout(() => map.invalidateSize(), 150); } catch (e) {}
    });
    
    // Colors
    const COLORS = {
      suitable: '#22c55e',
      suitableStale: '#eab308',
      suitableOld: '#f97316',
      unsuitable: '#6b7280',
      pending: '#ef4444',
      route: '#e879f9'
    };
    
    // Calculate days since date
    function daysSince(dateStr) {
      if (!dateStr) return Infinity;
      const then = new Date(dateStr);
      const now = new Date();
      return Math.floor((now - then) / (1000 * 60 * 60 * 24));
    }
    
    // Get color based on status and age
    function getShapeColor(status, lastChecked) {
      if (status === 'Unsuitable') return COLORS.unsuitable;
      if (status === 'Pending' || status === 'New SFLA' || !status || status === 'Unknown') return COLORS.pending;
      
      if (status === 'Suitable') {
        const days = daysSince(lastChecked);
        if (days >= 28) return COLORS.suitableOld;    // 4+ weeks
        if (days >= 21) return COLORS.suitableStale;   // 3+ weeks
        return COLORS.suitable;                        // Fresh
      }
      
      return COLORS.pending;
    }
    
    // Get status class for popup
    function getStatusClass(status, lastChecked) {
      if (status === 'Unsuitable') return 'status-unsuitable';
      if (status === 'Pending' || status === 'New SFLA' || !status || status === 'Unknown') return 'status-pending';
      
      if (status === 'Suitable') {
        const days = daysSince(lastChecked);
        if (days >= 28) return 'status-suitable-old';
        if (days >= 21) return 'status-suitable-stale';
        return 'status-suitable';
      }
      
      return 'status-pending';
    }
    
    // Get display status
    function getDisplayStatus(status, lastChecked) {
      if (status === 'Unsuitable') return 'Unsuitable';
      if (status === 'Pending' || !status || status === 'Unknown') return 'Pending Review';
      
      if (status === 'Suitable') {
        const days = daysSince(lastChecked);
        if (days >= 28) return 'Suitable (4+ wks)';
        if (days >= 21) return 'Suitable (3+ wks)';
        return 'Suitable';
      }
      
      return 'Pending Review';
    }
    
    // Map layers
    const darkLayer = L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
      attribution: '©OpenStreetMap, ©CARTO'
    });
    const satelliteLayer = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
      attribution: '©Esri'
    });
    
    // Initialize map
    const map = L.map('map', {
      center: [24.78, 46.74],
      zoom: 13,
      layers: [darkLayer],
      zoomControl: false,
      tap: true,
      tapTolerance: 20
    });
    
    let isSatellite = false;
    let polygons = {};
    let labels = {};
    let siteData = {};
    let locationMarker = null;
    let selectedShape = null;
    let selectedPoly = null;
    
    // UI elements
    const infoPanel = document.getElementById('info-panel');
    const radialMenu = document.getElementById('radial-menu');
    const radialSuitable = document.getElementById('radialSuitable');
    const radialUnsuitable = document.getElementById('radialUnsuitable');
    const radialClose = document.getElementById('radialClose');
    const lineSuitable = document.getElementById('lineSuitable');
    const lineUnsuitable = document.getElementById('lineUnsuitable');
    
    // Toggle satellite
    document.getElementById('btnSatellite').addEventListener('click', function() {
      isSatellite = !isSatellite;
      this.classList.toggle('active', isSatellite);
      if (isSatellite) {
        map.removeLayer(darkLayer);
        map.addLayer(satelliteLayer);
      } else {
        map.removeLayer(satelliteLayer);
        map.addLayer(darkLayer);
      }
    });
    
    // Zoom controls
    document.getElementById('btnZoomIn').addEventListener('click', () => map.zoomIn());
    document.getElementById('btnZoomOut').addEventListener('click', () => map.zoomOut());
    
    // Location tracking state
    let watchId = null;
    let isFollowing = false;
    let accuracyCircle = null;
    const btnLocation = document.getElementById('btnLocation');
    
    function startFollowing() {
      isFollowing = true;
      btnLocation.classList.add('active');
      btnLocation.textContent = '📍';
      if (locationMarker) {
        locationMarker.getElement()?.classList.add('following');
      }
    }
    
    function stopFollowing() {
      isFollowing = false;
      btnLocation.classList.remove('active');
      if (locationMarker) {
        locationMarker.getElement()?.classList.remove('following');
      }
    }
    
    function updateLocation(pos) {
      const latlng = [pos.coords.latitude, pos.coords.longitude];
      const accuracy = pos.coords.accuracy;
      
      if (locationMarker) {
        locationMarker.setLatLng(latlng);
      } else {
        locationMarker = L.marker(latlng, {
          icon: L.divIcon({ className: 'my-location following', iconSize: [16, 16] })
        }).addTo(map);
      }
      
      // Accuracy circle
      if (accuracyCircle) {
        accuracyCircle.setLatLng(latlng).setRadius(accuracy);
      } else {
        accuracyCircle = L.circle(latlng, {
          radius: accuracy,
          className: 'accuracy-circle',
          stroke: true,
          color: 'rgba(59,130,246,0.3)',
          fillColor: 'rgba(59,130,246,0.08)',
          weight: 1
        }).addTo(map);
      }
      
      if (isFollowing) {
        map.setView(latlng, Math.max(map.getZoom(), 14), { animate: true });
      }
    }
    
    function stopTracking() {
      if (watchId !== null) {
        navigator.geolocation.clearWatch(watchId);
        watchId = null;
      }
      stopFollowing();
      btnLocation.textContent = '📍';
      // Remove marker and accuracy circle when tracking is off
      if (locationMarker) { map.removeLayer(locationMarker); locationMarker = null; }
      if (accuracyCircle) { map.removeLayer(accuracyCircle); accuracyCircle = null; }
    }

    btnLocation.addEventListener('click', function() {
      if (watchId !== null && isFollowing) {
        // Currently following — stop following but keep dot visible
        stopFollowing();
        btnLocation.textContent = '📌';
        return;
      }
      
      if (watchId !== null && !isFollowing) {
        // Tracking but not following — turn off entirely
        stopTracking();
        return;
      }
      
      // Not tracking — start fresh
      this.textContent = '⏳';
      startFollowing();
      watchId = navigator.geolocation.watchPosition(
        (pos) => {
          updateLocation(pos);
        },
        (err) => {
          alert('Could not get location');
          stopTracking();
        },
        { enableHighAccuracy: true, maximumAge: 5000, timeout: 15000 }
      );
    });
    
    // Stop following when user manually drags/pans/zooms the map
    map.on('dragstart', () => {
      if (isFollowing) stopFollowing();
    });
    map.on('touchmove', () => {
      if (isFollowing) stopFollowing();
    });
    
    // Format area
    function formatArea(m2) {
      if (m2 >= 10000) return (m2 / 10000).toFixed(1) + ' ha';
      return m2.toLocaleString() + ' m²';
    }
    
    // Render routes
    function renderRoutes() {
      if (typeof ROUTES !== 'undefined') {
        ROUTES.forEach(route => {
          L.polyline(route.coords, {
            color: COLORS.route,
            weight: 4,
            dashArray: '10, 10',
            opacity: 0.9
          }).addTo(map).bindPopup(`<div class="popup-name">${route.name}</div>`);
          // route-name pill at the true midpoint (50% along the line by length)
          const c = route.coords;
          if (c && c.length >= 2) {
            const segs = []; let total = 0;
            for (let i = 0; i < c.length - 1; i++) { const d = Math.hypot(c[i+1][0]-c[i][0], c[i+1][1]-c[i][1]); segs.push(d); total += d; }
            let half = total / 2, mid = c[0];
            for (let i = 0; i < segs.length; i++) {
              if (half <= segs[i]) { const t = segs[i] === 0 ? 0 : half / segs[i];
                mid = [c[i][0] + (c[i+1][0]-c[i][0])*t, c[i][1] + (c[i+1][1]-c[i][1])*t]; break; }
              half -= segs[i];
            }
            L.marker(mid, { interactive: false, icon: L.divIcon({ className: 'route-pill', html: route.name, iconSize: null }) }).addTo(map);
          }
        });
      }
    }
    
    // Render GPS points as labeled pins
    function renderGPSPoints() {
      if (typeof GPS_POINTS !== 'undefined') {
        GPS_POINTS.forEach(pt => {
          const marker = L.circleMarker([pt.lat, pt.lng], {
            radius: 6,
            fillColor: '#00ffff',
            color: '#fff',
            weight: 2,
            fillOpacity: 0.9
          }).addTo(map);
          marker.bindTooltip(pt.name, {
            permanent: true,
            direction: 'right',
            offset: [8, 0],
            className: 'gps-label'
          });
        });
      }
    }

    // Load baked status (no token) from data.geojson
    async function loadSiteData() {
      try {
        const gj = await (await fetch('data.geojson')).json();
        (gj.features || []).forEach(f => {
          const p = f.properties;
          siteData[p.name] = { fields: { 'SFLA Name': p.name, Status: p.status, LastChecked: p.lastChecked, CheckCount: p.checkCount, Notes: p.notes } };
        });
        renderRoutes();
        renderGPSPoints();
        renderShapes();
      } catch (err) {
        console.error('Failed to load:', err);
      }
    }
    
    // Render shapes (filtered to the selected area)
    function renderShapes() {
      VIS_SHAPES_FN().forEach(shape => {
        const site = siteData[shape.name];
        const status = site?.fields?.Status || 'Pending';
        const lastChecked = site?.fields?.LastChecked;
        const color = getShapeColor(status, lastChecked);
        
        // Polygon with increased weight for easier tapping
        const poly = L.polygon(shape.coords, {
          color: color,
          fillColor: color,
          fillOpacity: 0.45,
          weight: 1.6
        }).addTo(map);
        
        poly.on('click', (e) => {
          L.DomEvent.stopPropagation(e);
          showRadialMenu(shape, poly, e.latlng);
        });
        polygons[shape.name] = poly;
        
        // Label
        const label = L.marker(shape.center, {
          icon: L.divIcon({
            className: 'shape-label',
            html: shape.name,
            iconSize: null
          })
        }).addTo(map);
        labels[shape.name] = label;
      });
    }
    
    // Update shape color
    function updateShapeColor(name, status, lastChecked) {
      const poly = polygons[name];
      if (poly) {
        const color = getShapeColor(status, lastChecked);
        poly.setStyle({ color, fillColor: color });
      }
    }
    
    // Draw line helper
    function drawLine(lineEl, x1, y1, x2, y2) {
      const dx = x2 - x1;
      const dy = y2 - y1;
      const length = Math.sqrt(dx * dx + dy * dy);
      const angle = Math.atan2(dy, dx) * 180 / Math.PI;
      lineEl.style.left = x1 + 'px';
      lineEl.style.top = y1 + 'px';
      lineEl.style.width = length + 'px';
      lineEl.style.transform = `rotate(${angle}deg)`;
    }
    
    // Show radial menu
    function showRadialMenu(shape, poly, latlng) {
      // Deselect previous
      if (selectedPoly) {
        const prevSite = siteData[selectedShape.name];
        const prevStatus = prevSite?.fields?.Status || 'Pending';
        const prevLastChecked = prevSite?.fields?.LastChecked;
        const prevColor = getShapeColor(prevStatus, prevLastChecked);
        selectedPoly.setStyle({ weight: 5 });
      }
      
      selectedShape = shape;
      selectedPoly = poly;
      
      // Highlight selected
      poly.setStyle({ weight: 7 });
      poly.bringToFront();
      
      // Update info panel
      const site = siteData[shape.name];
      const status = site?.fields?.Status || 'Pending';
      const lastChecked = site?.fields?.LastChecked;
      const lastCheckedDisplay = lastChecked 
        ? new Date(lastChecked).toLocaleDateString('en-GB') 
        : 'Never';
      const notes = site?.fields?.Notes || '';
      
      document.getElementById('panelName').textContent = shape.name;
      document.getElementById('panelStatus').textContent = getDisplayStatus(status, lastChecked);
      document.getElementById('panelArea').textContent = shape.area_m2 ? formatArea(shape.area_m2) : '';
      document.getElementById('panelDate').textContent = `Last: ${lastCheckedDisplay}`;
      document.getElementById('panelNotes').value = notes;
      infoPanel.classList.add('active');
      
      // Position radial buttons
      const point = map.latLngToContainerPoint(latlng);
      const cx = point.x;
      const cy = point.y;
      const radius = 65;
      
      // Suitable - top left
      const angle1 = -Math.PI * 3/4;
      const x1 = cx + Math.cos(angle1) * radius - 24;
      const y1 = cy + Math.sin(angle1) * radius - 24;
      radialSuitable.style.left = x1 + 'px';
      radialSuitable.style.top = y1 + 'px';
      
      // Unsuitable - top right
      const angle2 = -Math.PI / 4;
      const x2 = cx + Math.cos(angle2) * radius - 24;
      const y2 = cy + Math.sin(angle2) * radius - 24;
      radialUnsuitable.style.left = x2 + 'px';
      radialUnsuitable.style.top = y2 + 'px';
      
      // Close - bottom
      radialClose.style.left = (cx - 18) + 'px';
      radialClose.style.top = (cy + radius - 18) + 'px';
      
      // Draw lines
      drawLine(lineSuitable, cx, cy, x1 + 24, y1 + 24);
      drawLine(lineUnsuitable, cx, cy, x2 + 24, y2 + 24);
      
      radialMenu.classList.add('active');
    }
    
    // Close panel and radial
    function closePanel() {
      infoPanel.classList.remove('active');
      radialMenu.classList.remove('active');
      if (selectedPoly) {
        selectedPoly.setStyle({ weight: 5 });
      }
      selectedShape = null;
      selectedPoly = null;
    }
    
    // Radial button handlers
    radialSuitable.addEventListener('click', () => {
      if (selectedShape) saveStatus('Suitable');
    });
    radialUnsuitable.addEventListener('click', () => {
      if (selectedShape) saveStatus('Unsuitable');
    });
    radialClose.addEventListener('click', closePanel);
    
    // Close on map click
    map.on('click', closePanel);
    
    // Update radial position on map move
    map.on('move', () => {
      if (selectedShape && radialMenu.classList.contains('active')) {
        const latlng = selectedShape.center;
        const point = map.latLngToContainerPoint(latlng);
        const cx = point.x;
        const cy = point.y;
        const radius = 65;
        
        const angle1 = -Math.PI * 3/4;
        radialSuitable.style.left = (cx + Math.cos(angle1) * radius - 24) + 'px';
        radialSuitable.style.top = (cy + Math.sin(angle1) * radius - 24) + 'px';
        
        const angle2 = -Math.PI / 4;
        radialUnsuitable.style.left = (cx + Math.cos(angle2) * radius - 24) + 'px';
        radialUnsuitable.style.top = (cy + Math.sin(angle2) * radius - 24) + 'px';
        
        radialClose.style.left = (cx - 18) + 'px';
        radialClose.style.top = (cy + radius - 18) + 'px';
        
        drawLine(lineSuitable, cx, cy, cx + Math.cos(angle1) * radius, cy + Math.sin(angle1) * radius);
        drawLine(lineUnsuitable, cx, cy, cx + Math.cos(angle2) * radius, cy + Math.sin(angle2) * radius);
      }
    });
    
    // Save status via the PIN-gated Cloudflare Worker (server-side token)
    async function saveStatus(status) {
      if (!selectedShape) return;
      const name = selectedShape.name;
      const notes = document.getElementById('panelNotes').value || '';
      const today = new Date().toISOString().split('T')[0];
      if (!WORKER_URL) { alert('Live update not configured yet.'); return; }
      const pin = getPin(); if (!pin) return;
      radialSuitable.disabled = true;
      radialUnsuitable.disabled = true;
      try {
        const resp = await fetch(WORKER_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, status, notes, pin })
        });
        if (resp.status === 401) { localStorage.removeItem('sflaPin'); throw new Error('Wrong PIN'); }
        if (!resp.ok) throw new Error('Save failed (' + resp.status + ')');
        siteData[name] = { fields: { 'SFLA Name': name, Status: status, LastChecked: today, Notes: notes,
          CheckCount: (siteData[name]?.fields?.CheckCount || 0) + 1 } };
        updateShapeColor(name, status, today);
        closePanel();
      } catch (err) {
        console.error('Save error:', err);
        alert('Failed to save: ' + err.message);
      } finally {
        radialSuitable.disabled = false;
        radialUnsuitable.disabled = false;
      }
    }
    
    // Init
    loadSiteData();
  </script>
</body>
</html>
