<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>SFLA map shot</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="shapes.js"></script>
<style>
  html,body,#map{height:100%;width:100%;margin:0;padding:0;background:#ffffff}
  .leaflet-control-attribution{display:none}
  .legend{position:absolute;bottom:10px;left:10px;z-index:500;background:rgba(255,255,255,.92);
          border-radius:8px;padding:8px 10px;font:600 11px -apple-system,'Segoe UI',Roboto,sans-serif;color:#222}
  .legend .row{display:flex;align-items:center;gap:6px;margin:2px 0}
  .legend .sw{width:12px;height:12px;border-radius:3px;border:1px solid #888}
  .lbl{font:700 10px -apple-system,'Segoe UI',sans-serif;color:#fff;text-shadow:0 0 3px #000;white-space:nowrap}
</style>
</head>
<body>
<div id="map"></div>
<script>
const AREA_TAGS={uam:'UAM',malham:'Malham','city-tour':'City Tour',najd:'NAJD'};
const TAG=AREA_TAGS[new URLSearchParams(location.search).get('area')]||null;
const C={green:'#2e9e4f',yellow:'#e3b505',orange:'#e8730c',red:'#cf2330',grey:'#8a8f98'};
function color(p){
  if(p.status==='Unsuitable')return C.grey;
  if(p.status==='New SFLA')return C.red;
  let d=9999; if(p.lastChecked)d=(Date.now()-Date.parse(p.lastChecked))/864e5;
  if(p.status==='Pending Recheck')return d>28?C.orange:C.yellow;
  if(d<=20)return C.green; if(d<=28)return C.yellow; return C.orange;
}
const map=L.map('map',{zoomControl:false,attributionControl:false});
L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',{maxZoom:19}).addTo(map);
// routes (approved) + VRP under the SFLAs
if(typeof ROUTES!=='undefined') ROUTES.forEach(r=>L.polyline(r.coords,{color:'#39d353',weight:2.5,opacity:.9,dashArray:'6,6'}).addTo(map));
if(typeof GPS_POINTS!=='undefined') GPS_POINTS.forEach(p=>L.circleMarker([p.lat,p.lng],{radius:3,color:'#fff',weight:1,fillColor:'#1565c0',fillOpacity:1}).addTo(map));
fetch('data.geojson').then(r=>r.json()).then(gj=>{
  const feats=gj.features.filter(f=>!TAG||(f.properties.areas||[]).includes(TAG));
  const layer=L.geoJSON({type:'FeatureCollection',features:feats},{
    style:f=>{const c=color(f.properties);return{color:c,weight:1.4,fillColor:c,fillOpacity:.55}}
  }).addTo(map);
  if(feats.length)map.fitBounds(layer.getBounds().pad(0.04),{maxZoom:16});
  else map.setView([24.78,46.66],11);
  window.__shotReady=true;
});
// legend
const lg=document.createElement('div');lg.className='legend';
lg.innerHTML=`<div class="row"><span class="sw" style="background:${C.green}"></span>Suitable (≤20d)</div>
<div class="row"><span class="sw" style="background:${C.yellow}"></span>Recheck due</div>
<div class="row"><span class="sw" style="background:${C.orange}"></span>Overdue</div>
<div class="row"><span class="sw" style="background:${C.red}"></span>New</div>
<div class="row"><span class="sw" style="background:${C.grey}"></span>Unsuitable</div>`;
document.body.appendChild(lg);
</script>
</body>
</html>
